############################################################
# PapsAI XNet Configuration File
############################################################
#
# Official implementation of
#
# PapsAI XNet:
# An Explainable Hybrid Deep Learning Framework for
# Automated Cervical Cytology Classification
#
############################################################

############################################################
# Experiment
############################################################

experiment:

  name: "PapsAI XNet"

  version: "1.0.0"

  description: "Attention-guided CNN + ANFIS for cervical cytology classification"

  random_seed: 42

  output_directory: outputs

############################################################
# Dataset
############################################################

dataset:

  name: "Herlev"

  root: datasets/Herlev

  image_size: 224

  channels: 3

  num_classes: 7

  class_names:

    - Superficial Squamous Epithelial
    - Intermediate Squamous Epithelial
    - Columnar Epithelial
    - Mild Dysplasia
    - Moderate Dysplasia
    - Severe Dysplasia
    - Carcinoma in Situ

############################################################
# Dataset Split
############################################################

split:

  train: 0.70

  validation: 0.10

  test: 0.20

############################################################
# Data Loading
############################################################

dataloader:

  batch_size: 32

  shuffle: true

  num_workers: 4

  pin_memory: true

  drop_last: false

############################################################
# Data Augmentation
############################################################

augmentation:

  training:

    horizontal_flip: true

    vertical_flip: true

    rotation:

      enabled: true

      degrees: 20

    brightness:

      enabled: true

      factor: 0.20

    contrast:

      enabled: true

      factor: 0.20

    gaussian_noise:

      enabled: true

      mean: 0.0

      std: 0.02

      probability: 0.50

  normalization:

    mean:

      - 0.485
      - 0.456
      - 0.406

    std:

      - 0.229
      - 0.224
      - 0.225

############################################################
# CNN Backbone
############################################################

cnn:

  architecture: "PapsAI CNN"

  input_channels: 3

  embedding_dimension: 32

  conv_blocks:

    - filters: 32
      kernel_size: 3

    - filters: 64
      kernel_size: 3

    - filters: 128
      kernel_size: 3

    - filters: 256
      kernel_size: 3

  activation: ReLU

  normalization: BatchNorm

  pooling: MaxPool2D

  pooling_kernel: 2

  global_average_pooling: true

############################################################
# Channel Attention Module
############################################################

attention:

  enabled: true

  type: "Squeeze-and-Excitation"

  reduction_ratio: 16

############################################################
# Feature Normalization
############################################################

feature_normalization:

  enabled: true

  method: "L2"

  epsilon: 1.0e-8

############################################################
# CNN Training
############################################################

training:

  optimizer: Adam

  learning_rate: 0.0001

  beta1: 0.9

  beta2: 0.999

  weight_decay: 0.00001

  epochs: 50

  loss_function: CrossEntropyLoss

############################################################
# Early Stopping
############################################################

early_stopping:

  enabled: true

  monitor: validation_loss

  patience: 10

  min_delta: 0.0001

############################################################
# ANFIS
############################################################

anfis:

  input_dimension: 32

  fuzzy_rules: 16

  membership_functions_per_feature: 2

  membership_function: Gaussian

  inference_type: First-Order Sugeno

  consequent_learning: Least Squares

  premise_learning: Gradient Descent

  learning_rate: 0.001

  convergence_threshold: 0.0001

############################################################
# Stage 2 Training
############################################################

stage2:

  freeze_cnn: true

  optimize_membership_functions: true

  optimize_consequents: true

############################################################
# Evaluation
############################################################

evaluation:

  metrics:

    - Accuracy
    - Sensitivity
    - Specificity
    - Precision
    - Recall
    - F1
    - ROC
    - AUC

  confidence_interval: 95

############################################################
# Explainability
############################################################

explainability:

  gaussian_membership_functions: true

  fuzzy_rule_heatmap: true

  fuzzy_rule_surfaces: true

  rule_activation_maps: true

############################################################
# Computational Complexity
############################################################

complexity:

  report_parameters: true

  report_flops: true

  report_inference_time: true

############################################################
# Hardware
############################################################

hardware:

  device: cuda

  mixed_precision: false

############################################################
# Logging
############################################################

logging:

  save_best_model: true

  save_last_model: true

  tensorboard: true

  log_interval: 10

############################################################
# Checkpoints
############################################################

checkpoints:

  directory: checkpoints

  best_model: papsai_xnet_best.pth

  last_model: papsai_xnet_last.pth

############################################################
# Output Directories
############################################################

paths:

  figures: figures

  logs: logs

  outputs: outputs

  checkpoints: checkpoints

  models: models

############################################################
# Reproducibility
############################################################

reproducibility:

  deterministic: true

  benchmark: false

############################################################
# Deployment
############################################################

deployment:

  target: "PapsAI Digital Microscope"

  inference_batch_size: 1

  export:

    onnx: false

    torchscript: false
